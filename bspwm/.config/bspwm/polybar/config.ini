[colors]
background-alt = #161616
background = #000000
foreground = #C5C8C6
primary = #458588
secondary = #52bdff

info = "#458588"
success = "#689d6a"
warning = #DBC704
urgent = "#fb4934"

disabled = #4e5b55
border = #0f2923


[bar/example]
width = 100%
height = 24pt
radius = 16

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4
border-color = #00000000

padding-left = 1
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

#font-0 = JetBrainsMono Nerd Font:size=12.5:weight=medium;3
font-0 = Roboto Mono Nerd Font:size=12.5:weight=medium;3

modules-left = xworkspaces
modules-center = xwindow
modules-right = battery memory pulseaudio hour powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

;tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.urgent}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:75:...%

[module/battery]
type = internal/battery
full-at = 99
low-at = 10
battery = BAT0
adapter = ADP1
poll-interval = 5

format-charging-prefix = "Ôá¶"
format-charging-prefix-foreground = ${colors.disabled}
format-charging = <label-charging>
format-charging-foreground = ${colors.foreground}

format-full-prefix = "ůįĀĻ"
format-full-prefix-foreground = ${colors.disabled}
format-full = <label-full>
format-full-foreground = ${colors.success}

format-discharging-prefix = "ůįĀĻ"
format-discharging-prefix-foreground = ${colors.disabled}
format-discharging = <label-discharging>
format-discharging-foreground = ${colors.foreground}

label-charging = " %percentage%% "
label-discharging =" %percentage%% "
label-full = " %percentage%% "  

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "ůįēĺ "
format-volume-prefix-foreground = ${colors.disabled}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ůįíč "
format-prefix-foreground = ${colors.disabled}
label = %percentage_used:2%%

[module/hour]
type = custom/script
interval = 5
label-foreground = ${colors.disabled}
format = <label>
exec = "LC_TIME="pt_br_utf8" date +"%H:%M""
label-padding = 0
label-font = 1
click-left = gsimplecal

[module/powermenu]
type = custom/menu
expand-right = true
format-spacing = 1
label-open = "ÔÄĎ"
label-open-foreground = ${colors.urgent}
label-close = "ůĪéė Cancel"
label-close-foreground = ${colors.success}
label-separator = |
label-separator-foreground = ${colors.foreground}
;Powermenu
menu-0-0 = "Óęí Reboot"
menu-0-0-exec = menu-open-1
menu-0-0-foreground = ${colors.urgent}
menu-0-1 = "ÔÄĎ Power Off"
menu-0-1-exec = menu-open-2
menu-0-1-foreground = ${colors.urgent}
;reboot
menu-1-0 = "ůįłě Confirm"
menu-1-0-exec = systemctl reboot
menu-1-0-foreground = ${colors.urgent}
;poweroff
menu-2-0 = "ůįłě Confirm"
menu-2-0-exec = systemctl poweroff
menu-2-0-foreground = ${colors.urgent}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
